<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chill app</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link 
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap" 
        rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <header>
            <!-- image logo -->
            <img src="/daftar-chill/daftar-img/Logo.png" alt="logo chill">

            <!-- judul and paraf -->
            <div>
                <h1>Masuk</h1>
                <p>selamat datang Kembali!</p>
            </div>
        </header>

        <!-- box form -->
        <form action="">
            
            <!-- input username -->
            <div class="box-username">
                <label for="username">Username</label>
                <input 
                    id="username" 
                    type="text" 
                    name="username"  
                    type="text" 
                    placeholder="Masukan Username"
                >
            </div>


            <!-- input password -->
         
            <div class="box-konfrmasi_password">
                <div>
                    <label for="password">Kata sandi</label>
                <input 
                    
                    type="password" 
                    name="password" 
                    placeholder="Masukan Kata Sandi">
                      
                     </div>
                     <img class="eye-off" src="../daftar-chill/daftar-img/eye-off.png" alt="">

                     <div class="condtional">
 <div class="list-daftar">
                        <p>
                           Belum Punya Akun?
                            <a id="masuk" href="../daftar-chill/index.html">Masuk</a>
                        </p>
                    </div>
                    <div class="list-Lupa_Password">
                        <a href="">Lupa kata sandi</a>
                    </div>
                     </div>
                     
                </div>
                
                
           

           

            <!-- box button -->
            <div class="box-button">

                <!-- button masuk -->
                <div>
                    <button class="button-masuk">Masuk</button>   
                </div>

                <div>
                    <p class="atau" >Atau</p> 
                </div>

                <!-- button masuk google -->
                <div class="box-masukan_google">
                    <button class="button-masuk_google">
                        <img src="/daftar-chill/daftar-img/logo_google.png" alt="">
                        <span>Daftar Dengan Google</span>
                    </button>  
                </div>

            </div>

        </form>
    </main>
</body>
</html>
